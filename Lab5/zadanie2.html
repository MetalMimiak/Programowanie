        <h1>Zadanie 2</h1>
        <script>
            function liczbyParzyste(a,b) {
                let tablicaParzystych = [];
                for (let i = a; i <= b; i++) {
                    if (i % 2 === 0) {
                        tablicaParzystych.push(i);
                    }
                }
                console.log(tablicaParzystych);
            }
            liczbyParzyste(1, 10);
        </script>

    <body>
        <h1>Zadanie 3</h1>
        <script>
            function tablicaFibonacci(n) {
                if (n <= 0) {
                    console.log("Podaj liczbę większą od 0");
                    return;
                }
                if (n === 1) {
                    console.log([0]);
                    return;
                }
                let fib = [0, 1];
                for (let i = 2; i < n; i++) {
                    fib[i] = fib[i - 1] + fib[i - 2]; //lub fib.push(fib[i - 1] + fib[i - 2]); elementy same się dodają do tablicy
                }
                console.log(fib);
            }
            tablicaFibonacci(10);
        </script>
    </body>

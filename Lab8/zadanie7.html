<!DOCTYPE html>
<html lang="pl">
    <head>
        <meta charset="utf-8">
        <title>Laboratorium 8</title>
    </head>
    <body>
        <h2>Zadanie 7</h2>

        <script>
            class ComplexNumber {
                constructor(real, imaginary) {
                    this.real = real;
                    this.imaginary = imaginary;
                }
                wypisz() {
                    if (this.imaginary < 0) return this.real + " - " + Math.abs(this.imaginary) + "i";
                    else return this.real + " + " + this.imaginary + "i";
                }

                module() {
                    return Math.sqrt(Math.pow(this.real, 2) + Math.pow(this.imaginary, 2));
                }
            }
            function generujTabliceZespolonych(n) {
                let tablica = [];
                for (let i = 0; i < n; i++) {
                    let r = Math.floor(Math.random() * 21) - 10; 
                    let im = Math.floor(Math.random() * 21) - 10;
                    tablica.push(new ComplexNumber(r, im));
                }
                return tablica;
            }

            const dane = generujTabliceZespolonych(5);

            console.log("Wszystkie wylosowane liczby i ich moduły:");
            dane.forEach(liczba => {
                console.log(liczba.wypisz() + " | Moduł: " + liczba.module().toFixed(2));
            });

            const najmniejszyModul = dane.reduce((min, liczba) => liczba.module() < min ? liczba.module() : min, Infinity);

            console.log("Najmniejszy moduł: " + najmniejszyModuł.toFixed(2));
        </script>
    </body>
</html>
